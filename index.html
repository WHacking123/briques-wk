<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Mensal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f0c29,#1a1040,#0f172a);
  color:#fff;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

h1{
  font-size:28px;
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
  margin-bottom:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:12px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  overflow:hidden;
}

th,td{
  padding:10px;
  text-align:center;
}

input{
  width:100%;
  padding:6px;
  background:#111;
  border:1px solid #333;
  color:#fff;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#00ffb3;
  cursor:pointer;
}

.remove{
  background:red;
}

.actions{
  margin-top:30px;
}
</style>
</head>

<body>

<div class="container">
<h1>Dashboard Mensal</h1>

<div class="grid">
  <div class="card">Faturamento<br><b id="fat">0</b></div>
  <div class="card">Investimento<br><b id="inv">0</b></div>
  <div class="card">Lucro<br><b id="luc">0</b></div>
  <div class="card">%<br><b id="mar">0</b></div>
  <div class="card">ROI<br><b id="roi">0</b></div>
</div>

<table>
<thead>
<tr>
<th>Produto</th>
<th>Paguei</th>
<th>Vendi</th>
<th>Qtd</th>
<th>KM</th>
<th>Custo KM</th>
<th>Lucro</th>
<th></th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>

<div class="actions">
<button onclick="add()">+ Adicionar</button>
<button onclick="exp()">Exportar</button>
<input type="file" onchange="imp(event)">
</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("d"))||[];

function save(){
  localStorage.setItem("d",JSON.stringify(data));
}

function add(p="",pg="",vd="",q="",km=""){
  let tr=document.createElement("tr");
  tr.innerHTML=`
  <td><input value="${p}"></td>
  <td><input type="number" value="${pg}"></td>
  <td><input type="number" value="${vd}"></td>
  <td><input type="number" value="${q}"></td>
  <td><input type="number" value="${km}"></td>
  <td class="km">0</td>
  <td class="l">0</td>
  <td><button class="remove" onclick="del(this)">X</button></td>
  `;
  tr.querySelectorAll("input").forEach(i=>i.oninput=calc);
  document.getElementById("tb").appendChild(tr);
}

function del(b){
  b.closest("tr").remove();
  calc();
}

function load(){
  data.forEach(d=>add(d.p,d.pg,d.vd,d.q,d.km));
}
load();

function calc(){
  let rows=document.querySelectorAll("#tb tr");

  data=[];
  let fat=0,inv=0,des=0;

  rows.forEach(r=>{
    let i=r.querySelectorAll("input");

    let p=i[0].value;
    let pg=+i[1].value||0;
    let vd=+i[2].value||0;
    let q=+i[3].value||0;
    let km=+i[4].value||0;

    let custo=Math.ceil(km*1); // 1 real km
    let lucro=(vd*q)-(pg*q)-custo;

    r.querySelector(".km").innerText=custo;
    r.querySelector(".l").innerText=lucro;

    fat+=vd*q;
    inv+=pg*q;
    des+=custo;

    data.push({p,pg,vd,q,km});
  });

  let totalInv=inv+des;
  let l=fat-totalInv;

  document.getElementById("fat").innerText=fat;
  document.getElementById("inv").innerText=totalInv;
  document.getElementById("luc").innerText=l;
  document.getElementById("mar").innerText=((l/fat)*100||0).toFixed(1)+"%";
  document.getElementById("roi").innerText=((l/totalInv)*100||0).toFixed(1)+"%";

  save();
}

function exp(){
  let b=new Blob([JSON.stringify(data)],{type:"application/json"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(b);
  a.download="backup.json";
  a.click();
}

function imp(e){
  let f=e.target.files[0];
  let r=new FileReader();
  r.onload=x=>{
    localStorage.setItem("d",x.target.result);
    location.reload();
  }
  r.readAsText(f);
}

</script>

</body>
</html>
